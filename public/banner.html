<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkWhere - 宣傳 Banner</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f1f5f9;
    padding: 24px;
  }

  .banner {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #1e40af 0%, #2563eb 40%, #3b82f6 70%, #60a5fa 100%);
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 0 64px;
    box-shadow: 0 25px 50px -12px rgba(37, 99, 235, 0.4);
  }

  .banner::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }

  .banner::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: 30%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
    border-radius: 50%;
  }

  .content {
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.5px;
    margin-bottom: 28px;
  }

  .badge .dot {
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-size: 64px;
    font-weight: 800;
    color: white;
    letter-spacing: -1.5px;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  h1 span {
    display: inline-block;
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 24px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    margin-bottom: 40px;
    letter-spacing: 0.3px;
  }

  .features {
    display: flex;
    gap: 32px;
  }

  .feature {
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255,255,255,0.9);
    font-size: 16px;
    font-weight: 500;
  }

  .feature .icon {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .mockup {
    position: relative;
    z-index: 1;
    width: 380px;
    flex-shrink: 0;
    margin-left: 40px;
  }

  .phone {
    width: 280px;
    height: 560px;
    background: #0f172a;
    border-radius: 40px;
    padding: 12px;
    margin: 0 auto;
    box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
    position: relative;
  }

  .phone-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 28px;
    background: #0f172a;
    border-radius: 0 0 16px 16px;
    z-index: 2;
  }

  .phone-screen {
    width: 100%;
    height: 100%;
    background: #f8fafc;
    border-radius: 28px;
    overflow: hidden;
    position: relative;
  }

  .phone-header {
    background: #2563eb;
    padding: 16px 16px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .phone-header .app-name {
    color: white;
    font-size: 14px;
    font-weight: 700;
  }

  .phone-header .count {
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 100px;
  }

  .phone-card {
    margin: 12px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .phone-map {
    height: 80px;
    background: linear-gradient(135deg, #93c5fd, #bfdbfe);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .phone-map .pin {
    width: 24px;
    height: 24px;
    background: #ef4444;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    position: relative;
    box-shadow: 0 2px 4px rgba(239,68,68,0.4);
  }

  .phone-map .pin::after {
    content: '';
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .phone-info {
    padding: 10px 12px;
  }

  .phone-info .addr {
    font-size: 11px;
    color: #475569;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .phone-info .time {
    font-size: 10px;
    color: #94a3b8;
    display: flex;
    justify-content: space-between;
  }

  .phone-info .time .elapsed {
    color: #d97706;
    font-weight: 600;
  }

  .phone-fab {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #2563eb;
    color: white;
    font-size: 12px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 100px;
    box-shadow: 0 4px 12px rgba(37,99,235,0.4);
    white-space: nowrap;
  }

  .glow {
    position: absolute;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(251,191,36,0.15) 0%, transparent 70%);
    border-radius: 50%;
    top: 30%;
    left: -5%;
    pointer-events: none;
  }

  @media (max-width: 1024px) {
    .banner { width: 100%; height: auto; min-height: 400px; padding: 48px 32px; flex-direction: column; text-align: center; }
    .features { justify-content: center; flex-wrap: wrap; }
    .mockup { margin: 32px 0 0; }
    .phone { width: 220px; height: 440px; }
    h1 { font-size: 40px; }
    .tagline { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="banner">
  <div class="glow"></div>
  <div class="content">
    <div class="badge">
      <span class="dot"></span>
      PWA · 離線可用 · 免費
    </div>
    <h1>再也不用<br>找 <span>車位</span></h1>
    <p class="tagline">一鍵記錄 · 精準導航 · 輕鬆找回</p>
    <div class="features">
      <div class="feature">
        <div class="icon">📍</div>
        <span>一鍵記錄位置</span>
      </div>
      <div class="feature">
        <div class="icon">🗺️</div>
        <span>地圖精準標記</span>
      </div>
      <div class="feature">
        <div class="icon">🧭</div>
        <span>支援導航</span>
      </div>
    </div>
  </div>
  <div class="mockup">
    <div class="phone">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <div class="phone-header">
          <span class="app-name">ParkWhere</span>
          <span class="count">1 筆</span>
        </div>
        <div class="phone-card">
          <div class="phone-map">
            <div class="pin"></div>
          </div>
          <div class="phone-info">
            <div class="addr">忠孝東路四段45號</div>
            <div class="time">
              <span>今天 14:30</span>
              <span class="elapsed">2 小時 15 分</span>
            </div>
          </div>
        </div>
        <div class="phone-card">
          <div class="phone-map" style="background: linear-gradient(135deg, #a5b4fc, #c7d2fe);">
            <div class="pin"></div>
          </div>
          <div class="phone-info">
            <div class="addr">松壽路9號 B2 · 車位 37</div>
            <div class="time">
              <span>昨天 19:20</span>
              <span class="elapsed">已取消</span>
            </div>
          </div>
        </div>
        <div class="phone-fab">📍 記錄停車位置</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
